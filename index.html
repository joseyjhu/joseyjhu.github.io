<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Josey Hu</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .card {

      background: #1b1b1b;

      padding: 40px;
    }
    h1 {
      margin-top: 0;
      font-size: 3rem;
    }
    p {
      color: #cfcfcf;
      line-height: 1.6;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Josey Hu</h1>
    <p>Welcome to my personal site.</p>
    <p>Publications and favorites coming soon.</p>
  </div>

</html>
