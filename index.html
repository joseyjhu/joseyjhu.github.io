<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Josey Hu</title>
  <meta name="description" content="Josey Hu's personal site: publications and a curated archive of favorite books, films, shows, games, anime, manga, webtoons, and animated movies." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-body">
  <main class="landing-grid">
    <section class="landing-cell landing-name">
      <div class="landing-name-inner">
        <div class="landing-first-name">Josey</div>
        <div class="landing-last-name">Hu</div>
      </div>
    </section>

    <section class="landing-cell landing-intro">
      <p>
        My personal works and favorite creative pieces (books, paintings, games, movies, shows, and music).
      </p>
    </section>

    <section class="landing-cell landing-nav">
      <ul>
        <li><a href="/publications/">Publications</a></li>
        <li><a href="/favorites/">Favorites</a></li>
      </ul>
    </section>

    <section class="landing-cell landing-empty" aria-label="Reserved panel"></section>

    <section class="landing-cell landing-portrait">
      <div class="landing-icon landing-icon-star" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M32 8l6.5 14.5L54 25l-11 10.5L45.5 52 32 43.5 18.5 52 21 35.5 10 25l15.5-2.5L32 8z"/>
        </svg>
      </div>
      <div class="landing-icon landing-icon-rocket" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M40 10c8 2 14 8 16 16-6 2-12 1-18-1L29 34c-2 1-4 3-5 5l-6 11 11-6c2-1 4-3 5-5l9-9c-2-6-3-12-1-18z"/>
          <circle cx="43" cy="21" r="4"/>
          <path d="M20 44l-6 6M27 51l-5 5"/>
        </svg>
      </div>
      <div class="landing-icon landing-icon-note" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M40 14v26a8 8 0 11-4-6.9V20l18-4v20a8 8 0 11-4-6.9V12l-10 2z"/>
        </svg>
      </div>
      <div class="landing-icon landing-icon-book" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 16h18c5 0 10 3 10 8v24c0-5-5-8-10-8H14z"/>
          <path d="M50 16H32c-5 0-10 3-10 8v24c0-5 5-8 10-8h18z"/>
        </svg>
      </div>
      <div class="landing-icon landing-icon-pencil" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 46l4 4 28-28-4-4-28 28z"/>
          <path d="M12 52l6-2-4-4-2 6z"/>
          <path d="M40 16l4-4 8 8-4 4"/>
        </svg>
      </div>
      <div class="landing-icon landing-icon-brush" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M42 10c6 6 8 12 6 18L30 46l-12 4 4-12 18-18c6-2 12 0 18 6z"/>
          <path d="M18 50c-3 0-6 3-6 6 5 0 8-1 10-3s2-5 2-7c-2 2-3 4-6 4z"/>
        </svg>
      </div>
      <img src="josey-sketch.png" alt="Stylized sketch portrait of Josey Hu" class="landing-portrait-image" />
</html>
